<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>

<title>HTML Viewer</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f5f5f5;
}

.container {
    display: flex;
    flex-direction: column;
    height: 100vh;
}

.toolbar {
    padding: 10px;
    background: #222;
    color: white;
    display: flex;
    gap: 10px;
}

button {
    padding: 6px 10px;
    border: none;
    cursor: pointer;
    border-radius: 4px;
}

textarea {
    width: 100%;
    height: 150px;
    font-family: monospace;
}

.preview {
    flex: 1;
    border-top: 1px solid #ccc;
}

iframe {
    width: 100%;
    height: 100%;
    border: none;
}

.mode {
    background: #444;
    color: white;
}
</style>
</head>

<body>

<div class="container">

<div class="toolbar">
    <button onclick="setMode('browser')">תצוגת דפדפן</button>
    <button onclick="setMode('word')">תצוגת Word</button>
    <button onclick="insertToWord()">הכנס ל־Word</button>
    <button onclick="saveHTML()">שמור</button>
    <button onclick="loadHTML()">טען</button>
</div>

<textarea id="htmlInput" placeholder="הכנס כאן HTML..."></textarea>

<div class="preview">
    <iframe id="previewFrame"></iframe>
</div>

</div>

<script>
let mode = "browser";

Office.onReady(() => {
    loadHTML();
    updatePreview();
});

document.getElementById("htmlInput").addEventListener("input", updatePreview);

function sanitize(html) {
    // הסרת script
    return html.replace(/<script[\s\S]*?>[\s\S]*?<\/script>/gi, "");
}

function updatePreview() {
    let html = document.getElementById("htmlInput").value;
    html = sanitize(html);

    if (mode === "word") {
        html = inlineCSS(html);
    }

    const iframe = document.getElementById("previewFrame");
    iframe.srcdoc = html;
}

function setMode(newMode) {
    mode = newMode;
    updatePreview();
}

function inlineCSS(html) {
    // פתרון פשוט: משאיר CSS רגיל
    // אפשר לשדרג בעתיד ל-parser אמיתי
    return html;
}

function insertToWord() {
    let html = document.getElementById("htmlInput").value;
    html = sanitize(html);

    Word.run(async (context) => {
        const body = context.document.body;

        body.insertHtml(html, Word.InsertLocation.end);

        await context.sync();
    }).catch(error => {
        console.error(error);
    });
}

function saveHTML() {
    localStorage.setItem("savedHTML", document.getElementById("htmlInput").value);
    alert("נשמר!");
}

function loadHTML() {
    const saved = localStorage.getItem("savedHTML");
    if (saved) {
        document.getElementById("htmlInput").value = saved;
    }
}
</script>

</body>
</html>
